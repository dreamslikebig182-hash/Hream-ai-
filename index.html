<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hream AI – Build Anything With Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fff; color: #111; }

    .header {
      background: linear-gradient(135deg, #7c3aed, #ff4dac);
      padding: 24px 16px; text-align: center; color: white;
    }
    .header h1 { font-size: 2.2rem; font-weight: 900; }
    .header p { margin-top: 6px; opacity: 0.9; font-size: 1rem; }

    .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }

    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      flex: 1; min-width: 100px; padding: 12px 8px;
      border-radius: 12px; border: 2px solid #ddd;
      background: white; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .tab.active-app { background: #e11d48; color: white; border-color: #e11d48; }
    .tab.active-web { background: #7c3aed; color: white; border-color: #7c3aed; }
    .tab.active-doubt { background: #ea580c; color: white; border-color: #ea580c; }

    .examples { margin-bottom: 16px; }
    .examples p { font-size: 0.85rem; font-weight: 700; color: #666; margin-bottom: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 6px 14px; border-radius: 999px;
      border: 1.5px solid #7c3aed; background: white;
      color: #7c3aed; font-weight: 700; font-size: 0.82rem;
      cursor: pointer;
    }

    textarea {
      width: 100%; padding: 14px; border-radius: 12px;
      border: 2px solid #7c3aed; font-size: 1rem;
      font-family: Arial, sans-serif; resize: vertical;
      outline: none; margin-bottom: 12px; color: #111;
    }

    .btn-generate {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c3aed, #ff4dac);
      color: white; font-weight: 900; font-size: 1.1rem;
      cursor: pointer; margin-bottom: 20px;
    }
    .btn-generate:disabled { background: #aaa; cursor: not-allowed; }

    .error {
      background: #fee2e2; color: #b91c1c;
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 12px; font-weight: 700;
    }

    .output-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
    }
    .output-title { color: #16a34a; font-weight: 900; font-size: 1.05rem; }
    .output-actions { display: flex; gap: 8px; }
    .btn-action {
      padding: 6px 14px; border-radius: 8px;
      border: 1.5px solid #ddd; background: white;
      font-weight: 700; cursor: pointer; font-size: 0.85rem;
    }

    pre {
      background: #1e1e2e; color: #cdd6f4;
      padding: 16px; border-radius: 12px;
      font-size: 0.87rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      max-height: 450px; overflow-y: auto;
      font-family: monospace;
    }

    .loading {
      text-align: center; padding: 16px;
      color: #7c3aed; font-weight: 700; font-size: 1rem;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #16a34a; color: white;
      padding: 12px 20px; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem;
      display: none; z-index: 999;
    }

    footer {
      text-align: center; padding: 24px;
      color: #999; font-size: 0.85rem;
    }
    footer span { color: #7c3aed; font-weight: 800; }
  </style>
</head>
<body>

<div class="header">
  <h1>🧠 Hream AI</h1>
  <p>Build Apps · Create Websites · Solve Code Doubts</p>
</div>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active-app" onclick="setMode('app')">📱 Make App</button>
    <button class="tab" onclick="setMode('web')" id="tab-web">🌐 Website</button>
    <button class="tab" onclick="setMode('doubt')" id="tab-doubt">❓ Code Doubt</button>
  </div>

  <!-- EXAMPLES -->
  <div class="examples">
    <p>💡 Click an example:</p>
    <div class="chips" id="chips"></div>
  </div>

  <!-- INPUT -->
  <textarea id="user-input" rows="4" placeholder="Describe the app you want to build..."></textarea>

  <!-- ERROR -->
  <div class="error" id="error-box" style="display:none"></div>

  <!-- BUTTON -->
  <button class="btn-generate" id="gen-btn" onclick="generate()">✨ Generate Code</button>

  <!-- LOADING -->
  <div class="loading" id="loading" style="display:none">🤖 Hream AI is writing your code...</div>

  <!-- OUTPUT -->
  <div id="output-section" style="display:none">
    <div class="output-header">
      <div class="output-title">✅ Code is Ready!</div>
      <div class="output-actions">
        <button class="btn-action" onclick="copyCode()">📋 Copy</button>
        <button class="btn-action" onclick="downloadCode()">⬇️ Download</button>
      </div>
    </div>
    <pre id="code-output"></pre>
  </div>

</div>

<footer>Made with 💖 by <span>Hream AI</span> · Build anything, no coding needed!</footer>

<div class="toast" id="toast"></div>

<script>
  var mode = 'app';
  var generatedCode = '';

  var config = {
    app: {
      placeholder: 'Describe the app you want to build...',
      color: '#e11d48',
      examples: ['Simple calculator', 'Quiz app with score', 'To-do list app', 'Login screen UI'],
      prompt: function(d, l) { return 'Generate complete working ' + (l === 'auto' ? 'best language' : l) + ' code for this app: "' + d + '". Add helpful comments. Output only the code.'; }
    },
    web: {
      placeholder: 'Describe the website you want...',
      color: '#7c3aed',
      examples: ['Portfolio website', 'Restaurant landing page', 'Blog homepage', 'Countdown timer page'],
      prompt: function(d, l) { return 'Generate complete working ' + (l === 'auto' ? 'HTML/CSS/JS single file' : l) + ' code for this website: "' + d + '". Make it beautiful. Output only the code.'; }
    },
    doubt: {
      placeholder: 'Type your coding question here...',
      color: '#ea580c',
      examples: ['What is a for loop?', 'What is an API?', 'Difference == and ===', 'What is recursion?'],
      prompt: function(d) { return 'Answer this coding question simply with examples and code: "' + d + '". Be beginner-friendly.'; }
    }
  };

  function setMode(m) {
    mode = m;
    document.getElementById('user-input').value = '';
    document.getElementById('user-input').placeholder = config[m].placeholder;
    document.getElementById('output-section').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';

    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(t) { t.className = 'tab'; });
    var idx = m === 'app' ? 0 : m === 'web' ? 1 : 2;
    tabs[idx].className = 'tab active-' + m;

    renderChips();
  }

  function renderChips() {
    var chips = document.getElementById('chips');
    chips.innerHTML = '';
    config[mode].examples.forEach(function(ex) {
      var btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = ex;
      btn.style.borderColor = config[mode].color;
      btn.style.color = config[mode].color;
      btn.onclick = function() { document.getElementById('user-input').value = ex; };
      chips.appendChild(btn);
    });
  }

  async function generate() {
    var input = document.getElementById('user-input').value.trim();
    if (!input) { showError('✏️ Please type something first!'); return; }

    document.getElementById('error-box').style.display = 'none';
    document.getElementById('output-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('gen-btn').disabled = true;
    document.getElementById('gen-btn').textContent = '⏳ Generating...';

    var prompt = config[mode].prompt(input, 'auto');

    try {
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      var data = await response.json();
      var text = data.content.map(function(i) { return i.text || ''; }).join('');
      generatedCode = text;

      document.getElementById('code-output').textContent = text;
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });

    } catch(err) {
      showError('❌ Something went wrong. Please try again.');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
    document.getElementById('gen-btn').textContent = '✨ Generate Code';
  }

  function copyCode() {
    navigator.clipboard.writeText(generatedCode);
    showToast('📋 Copied!');
  }

  function downloadCode() {
    var ext = mode === 'web' ? 'html' : 'txt';
    var blob = new Blob([generatedCode], { type: 'text/plain' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hream-ai.' + ext;
    a.click();
    showToast('⬇️ Downloaded!');
  }

  function showError(msg) {
    var box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 2500);
  }

  renderChips();
</script>
</body>
</html>
